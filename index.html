<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillGodAK Apps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff8ef;
      --card: #ffffff;
      --text: #273640;
      --muted: #6f6961;
      --brand: #d9965f;
      --line: #f0dfcf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(217, 150, 95, 0.24), transparent 34rem),
        linear-gradient(180deg, #fffaf3 0%, var(--bg) 100%);
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.2rem, 7vw, 4rem);
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 28px;
    }

    .card {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 16px 40px rgba(80, 54, 30, 0.08);
    }

    .icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      border-radius: 18px;
      background: #fff0e2;
      color: var(--brand);
      font-size: 1.7rem;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    a {
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffaf5;
    }

    footer {
      margin-top: 32px;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>SkillGodAK Apps</h1>
      <p>這裡整理 SkillGodAK 發布的應用程式資訊、隱私權政策與廣告授權檔案。</p>
    </header>

    <section class="grid" aria-label="應用程式列表">
      <article class="card">
        <div class="icon" aria-hidden="true">🐾</div>
        <h2>毛孩健康管理</h2>
        <p>記錄寵物健康、醫療紀錄、支出、日誌與提醒通知。</p>
        <div class="actions">
          <a class="button" href="/pet-health-privacy/">隱私權政策</a>
        </div>
      </article>

      <article class="card">
        <div class="icon" aria-hidden="true">🎙️</div>
        <h2>語音記帳</h2>
        <p>用語音快速記錄日常收支，整理個人記帳資訊。</p>
        <div class="actions">
          <a class="button" href="/privacy-policy/privacy-policy.html">隱私權政策</a>
        </div>
      </article>
    </section>

    <footer>
      <p>AdMob app-ads.txt：<a href="/app-ads.txt">/app-ads.txt</a></p>
    </footer>
  </main>
</body>
</html>
